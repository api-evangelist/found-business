openapi: 3.0.1
info:
  title: Found API
  description: >-
    Placeholder OpenAPI definition for Found (found.com), the business-banking
    app for the self-employed. As of the 2026-06-20 API Evangelist review, Found
    publishes NO public or partner developer API and NO public API reference or
    developer documentation. Found is a consumer/SMB application delivered through
    its web and mobile apps; banking is provided by Lead Bank (Member FDIC) and
    card processing by Marqeta, but neither Found nor those partnerships expose a
    documented public API to Found customers. This document intentionally contains
    no paths and no fabricated endpoints. It exists only so the apis.yml index can
    reference an OpenAPI artifact; it will be populated if and when Found publishes
    a documented API.
  termsOfService: https://found.com/legal/terms-of-service
  contact:
    name: Found Support
    url: https://found.com/help
  version: '0.0.0'
servers: []
paths: {}
components: {}
