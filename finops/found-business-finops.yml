publisherName: Found
serviceCategory: Financial Services
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Found
  ServiceCategory: Financial Services
  ProviderName: Found
  PublisherName: Found
  InvoiceIssuerName: Found
