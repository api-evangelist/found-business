description: >-
  FinOps view of Found spend. Found has no usage-metered API billing because it
  exposes no public developer API. Costs to a Found customer are subscription
  based: a free core plan plus optional Found Plus ($35/month, $315/year) and
  Found Pro ($80/month, $720/year) tiers. Banking is provided by Lead Bank
  (Member FDIC). The meters below model subscription charges, not API usage.
notes: >-
  Subscription pricing is public; there are no API usage meters because Found has
  no public API. Reconciled false because there is no programmatic billing or
  usage export to align with FOCUS. Verify current subscription prices on the
  Found pricing and help pages.
sources:
- https://found.com/
- https://found.com/help/found-plus/what-is-found-plus
- https://focus.finops.org/focus-specification/v1-3/
