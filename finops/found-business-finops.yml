meters:
- name: subscription_fee
  description: >-
    Monthly or annual subscription fee for the Found Plus or Found Pro tier; the
    core Found plan is free. This is a flat subscription charge, not API usage.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Review the Found subscription tier (Free, Plus, Pro) and its monthly/annual fee.
- name: Allocation
  description: Map the Found subscription cost to the self-employed owner or business as a flat operating expense.
- name: Optimization
  description: Choose the free plan unless the APY bonus, custom categories, or quarterly tax payments in Plus/Pro justify the fee.
- name: Accountability
  description: Re-evaluate the subscription tier periodically against actual feature usage.
